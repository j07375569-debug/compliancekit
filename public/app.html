<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComplianceKit — AI-Powered Compliance Autopilot</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ============================================ */
/* RESET & VARIABLES                           */
/* ============================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --bg-card: #12121a;
  --bg-card-hover: #1a1a26;
  --bg-sidebar: #0d0d14;
  --bg-input: #1a1a26;
  --border: #1e1e2e;
  --border-hover: #2a2a3e;
  --text: #e4e4e7;
  --text-secondary: #9393a8;
  --text-muted: #5f5f78;
  --primary: #6366f1;
  --primary-hover: #7577f5;
  --primary-bg: rgba(99,102,241,0.1);
  --success: #10b981;
  --success-bg: rgba(16,185,129,0.1);
  --warning: #f59e0b;
  --warning-bg: rgba(245,158,11,0.1);
  --danger: #ef4444;
  --danger-bg: rgba(239,68,68,0.1);
  --info: #3b82f6;
  --info-bg: rgba(59,130,246,0.1);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --transition: 0.2s ease;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ============================================ */
/* SCROLLBAR                                    */
/* ============================================ */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

/* ============================================ */
/* LAYOUT                                       */
/* ============================================ */
.app-layout { display: flex; min-height: 100vh; }

.sidebar {
  width: 260px;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 100;
  transition: transform var(--transition);
}

.main-content {
  flex: 1;
  margin-left: 260px;
  min-height: 100vh;
}

.page-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px;
}

/* ============================================ */
/* SIDEBAR                                      */
/* ============================================ */
.sidebar-logo {
  padding: 24px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}

.sidebar-logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--primary), #8b5cf6);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 800;
  color: white;
}

.sidebar-logo-text {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.sidebar-nav { padding: 16px 12px; flex: 1; }

.nav-section {
  margin-bottom: 24px;
}

.nav-section-title {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  padding: 0 8px;
  margin-bottom: 8px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition);
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 2px;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}

.nav-item:hover { background: var(--bg-card); color: var(--text); }
.nav-item.active { background: var(--primary-bg); color: var(--primary); }

.nav-item-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.nav-badge {
  margin-left: auto;
  background: var(--danger);
  color: white;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 10px;
  min-width: 20px;
  text-align: center;
}

.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}

.user-info {
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-avatar {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, #6366f1, #ec4899);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
  color: white;
}

.user-details { flex: 1; }
.user-name { font-size: 13px; font-weight: 600; }
.user-role { font-size: 11px; color: var(--text-muted); }

/* ============================================ */
/* PAGE HEADERS                                 */
/* ============================================ */
.page-header {
  margin-bottom: 32px;
}

.page-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}

.page-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
}

/* ============================================ */
/* CARDS                                        */
/* ============================================ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  transition: all var(--transition);
}

.card:hover { border-color: var(--border-hover); }

.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.card-title {
  font-size: 15px;
  font-weight: 600;
}

/* ============================================ */
/* STATS GRID                                   */
/* ============================================ */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  transition: all var(--transition);
}

.stat-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }

.stat-label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.stat-value {
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -1px;
  line-height: 1;
}

.stat-suffix {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-left: 2px;
}

.stat-change {
  font-size: 12px;
  margin-top: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ============================================ */
/* SCORE RING                                   */
/* ============================================ */
.score-ring-container {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.score-ring {
  transform: rotate(-90deg);
}

.score-ring-bg {
  fill: none;
  stroke: var(--border);
  stroke-width: 8;
}

.score-ring-fill {
  fill: none;
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s ease;
}

.score-ring-text {
  position: absolute;
  text-align: center;
}

.score-ring-value {
  font-size: 36px;
  font-weight: 800;
  line-height: 1;
}

.score-ring-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

/* ============================================ */
/* FRAMEWORK CARDS                              */
/* ============================================ */
.framework-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.framework-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: all var(--transition);
}

.framework-card:hover {
  border-color: var(--primary);
  transform: translateY(-2px);
  box-shadow: 0 8px 32px rgba(99,102,241,0.1);
}

.framework-card-header {
  display: flex;
  align-items: start;
  justify-content: space-between;
  margin-bottom: 16px;
}

.framework-badge {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
}

.progress-bar-bg {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 12px;
}

.progress-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1s ease;
}

.control-stats {
  display: flex;
  gap: 16px;
  margin-top: 12px;
}

.control-stat {
  font-size: 12px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.control-stat-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}

/* ============================================ */
/* CONTROLS TABLE                               */
/* ============================================ */
.controls-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}

.controls-table th {
  text-align: left;
  padding: 12px 16px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}

.controls-table td {
  padding: 14px 16px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}

.controls-table tr:hover td { background: var(--bg-card-hover); }

.control-id-cell {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 12px;
  font-weight: 600;
  color: var(--primary);
}

/* ============================================ */
/* STATUS BADGES                                */
/* ============================================ */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
}

.status-compliant { background: var(--success-bg); color: var(--success); }
.status-in_progress { background: var(--warning-bg); color: var(--warning); }
.status-non_compliant { background: var(--danger-bg); color: var(--danger); }
.status-not_started { background: rgba(100,100,130,0.1); color: var(--text-muted); }
.status-pending { background: var(--info-bg); color: var(--info); }
.status-approved { background: var(--success-bg); color: var(--success); }
.status-draft { background: var(--warning-bg); color: var(--warning); }

.severity-critical { background: var(--danger-bg); color: var(--danger); }
.severity-high { background: var(--warning-bg); color: var(--warning); }
.severity-medium { background: var(--info-bg); color: var(--info); }
.severity-low { background: rgba(100,100,130,0.1); color: var(--text-muted); }

/* ============================================ */
/* BUTTONS                                      */
/* ============================================ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  font-family: var(--font);
  border: none;
  cursor: pointer;
  transition: all var(--transition);
}

.btn-primary {
  background: var(--primary);
  color: white;
}
.btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }

.btn-secondary {
  background: var(--bg-input);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { border-color: var(--border-hover); background: var(--bg-card-hover); }

.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-ghost { background: none; color: var(--text-secondary); padding: 6px 10px; }
.btn-ghost:hover { color: var(--text); background: var(--bg-card); }

/* ============================================ */
/* ALERTS                                       */
/* ============================================ */
.alert-item {
  display: flex;
  align-items: start;
  gap: 12px;
  padding: 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  transition: all var(--transition);
  cursor: pointer;
}

.alert-item:hover { border-color: var(--border-hover); background: var(--bg-card-hover); }
.alert-item.unread { border-left: 3px solid var(--primary); }

.alert-icon { font-size: 20px; margin-top: 2px; }
.alert-content { flex: 1; }
.alert-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.alert-summary { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.alert-meta { font-size: 11px; color: var(--text-muted); margin-top: 6px; display: flex; gap: 12px; }

/* ============================================ */
/* EVIDENCE LIST                                */
/* ============================================ */
.evidence-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  transition: all var(--transition);
}

.evidence-item:hover { border-color: var(--border-hover); }

.evidence-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.evidence-info { flex: 1; }
.evidence-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.evidence-desc { font-size: 12px; color: var(--text-secondary); }
.evidence-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* ============================================ */
/* POLICY VIEWER                                */
/* ============================================ */
.policy-content {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 32px;
  font-size: 14px;
  line-height: 1.8;
  max-height: 600px;
  overflow-y: auto;
}

.policy-content h1 { font-size: 24px; font-weight: 700; margin: 0 0 16px 0; }
.policy-content h2 { font-size: 18px; font-weight: 700; margin: 24px 0 12px 0; color: var(--primary); }
.policy-content h3 { font-size: 15px; font-weight: 600; margin: 16px 0 8px 0; }
.policy-content ul, .policy-content ol { padding-left: 24px; margin: 8px 0; }
.policy-content li { margin: 4px 0; }
.policy-content table { width: 100%; border-collapse: collapse; margin: 12px 0; }
.policy-content th, .policy-content td { padding: 8px 12px; border: 1px solid var(--border); font-size: 13px; text-align: left; }
.policy-content th { background: var(--bg-card); font-weight: 600; }
.policy-content em { color: var(--text-muted); }
.policy-content strong { color: var(--text); }

/* ============================================ */
/* FORMS                                        */
/* ============================================ */
.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

.form-input, .form-select, .form-textarea {
  width: 100%;
  padding: 10px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: var(--font);
  color: var(--text);
  transition: border-color var(--transition);
}

.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--primary);
}

.form-select { cursor: pointer; }
.form-textarea { resize: vertical; min-height: 100px; }

/* ============================================ */
/* MODAL                                        */
/* ============================================ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  animation: fadeIn 0.2s ease;
}

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
  width: 90%;
  max-width: 560px;
  max-height: 80vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.modal-title { font-size: 20px; font-weight: 700; }

.modal-close {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: none;
  background: var(--bg-input);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
}

.modal-close:hover { background: var(--border); color: var(--text); }

.modal-actions {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 24px;
}

/* ============================================ */
/* ACTIVITY FEED                                */
/* ============================================ */
.activity-item {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.activity-item:last-child { border-bottom: none; }

.activity-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 6px;
  flex-shrink: 0;
}

.activity-text { font-size: 13px; color: var(--text-secondary); }
.activity-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* ============================================ */
/* GRID LAYOUTS                                 */
/* ============================================ */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
.grid-dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }

/* ============================================ */
/* LANDING PAGE                                 */
/* ============================================ */
.landing {
  min-height: 100vh;
  background: var(--bg);
}

.landing-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 48px;
  border-bottom: 1px solid var(--border);
  max-width: 1400px;
  margin: 0 auto;
}

.landing-hero {
  max-width: 900px;
  margin: 0 auto;
  padding: 100px 48px 80px;
  text-align: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  background: var(--primary-bg);
  border: 1px solid rgba(99,102,241,0.2);
  border-radius: 100px;
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 24px;
}

.hero-title {
  font-size: 56px;
  font-weight: 900;
  letter-spacing: -2px;
  line-height: 1.1;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #fff 0%, #e4e4e7 50%, #9393a8 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-subtitle {
  font-size: 18px;
  color: var(--text-secondary);
  max-width: 600px;
  margin: 0 auto 36px;
  line-height: 1.7;
}

.hero-cta {
  display: flex;
  gap: 12px;
  justify-content: center;
}

.hero-cta .btn-primary {
  padding: 14px 32px;
  font-size: 15px;
  border-radius: 10px;
}

.hero-cta .btn-secondary {
  padding: 14px 32px;
  font-size: 15px;
  border-radius: 10px;
}

.landing-features {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 48px 100px;
}

.features-title {
  text-align: center;
  font-size: 36px;
  font-weight: 800;
  letter-spacing: -1px;
  margin-bottom: 48px;
}

.features-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.feature-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  transition: all var(--transition);
}

.feature-card:hover {
  border-color: var(--primary);
  transform: translateY(-4px);
  box-shadow: 0 12px 40px rgba(99,102,241,0.1);
}

.feature-icon {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin-bottom: 16px;
}

.feature-title {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 8px;
}

.feature-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
}

.landing-pricing {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 48px 100px;
}

.pricing-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.pricing-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 32px;
  position: relative;
  transition: all var(--transition);
}

.pricing-card.popular {
  border-color: var(--primary);
  box-shadow: 0 0 40px rgba(99,102,241,0.15);
}

.pricing-popular-badge {
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 16px;
  border-radius: 100px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ============================================
// API LAYER
// ============================================
window.CK_API_URL = 'https://web-production-be130.up.railway.app';
const API = (window.CK_API_URL || '') + '/api';
const api = {
  get: async (path) => {
    const res = await fetch(`${API}${path}`);
    return res.json();
  },
  post: async (path, body) => {
    const res = await fetch(`${API}${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return res.json();
  },
  put: async (path, body) => {
    const res = await fetch(`${API}${path}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return res.json();
  },
  del: async (path) => {
    const res = await fetch(`${API}${path}`, { method: 'DELETE' });
    return res.json();
  },
};

// ============================================
// UTILITY FUNCTIONS
// ============================================
function getScoreColor(score) {
  if (score >= 80) return 'var(--success)';
  if (score >= 60) return 'var(--warning)';
  return 'var(--danger)';
}

function getStatusLabel(status) {
  const labels = {
    compliant: 'Compliant',
    in_progress: 'In Progress',
    non_compliant: 'Non-Compliant',
    not_started: 'Not Started',
    pending: 'Pending Review',
    approved: 'Approved',
    rejected: 'Rejected',
    draft: 'Draft',
  };
  return labels[status] || status;
}

function getActionIcon(action) {
  const icons = {
    evidence_uploaded: '📎',
    control_updated: '✅',
    policy_generated: '📄',
    framework_added: '🛡️',
    alert_received: '🔔',
    evidence_approved: '✓',
    report_generated: '📊',
  };
  return icons[action] || '•';
}

function getActionColor(action) {
  const colors = {
    evidence_uploaded: 'var(--info)',
    control_updated: 'var(--success)',
    policy_generated: 'var(--primary)',
    framework_added: 'var(--primary)',
    alert_received: 'var(--warning)',
    evidence_approved: 'var(--success)',
    report_generated: 'var(--info)',
  };
  return colors[action] || 'var(--text-muted)';
}

function getEvidenceIcon(type) {
  const icons = {
    screenshot: '🖼️',
    document: '📄',
    config: '⚙️',
    certificate: '🎓',
    policy: '📋',
    report: '📊',
    assessment: '🔍',
    contract: '📝',
    log: '📒',
  };
  return icons[type] || '📎';
}

function simpleMarkdown(text) {
  if (!text) return '';
  let html = text
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  if (!html.startsWith('<')) html = '<p>' + html + '</p>';
  // Simple table support
  html = html.replace(/\|(.+)\|/g, (match) => {
    const cells = match.split('|').filter(c => c.trim());
    if (cells.some(c => /^[-:]+$/.test(c.trim()))) return '';
    return '<tr>' + cells.map(c => `<td>${c.trim()}</td>`).join('') + '</tr>';
  });
  return html;
}

function timeAgo(dateStr) {
  const now = new Date();
  const date = new Date(dateStr);
  const diff = Math.floor((now - date) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
  return `${Math.floor(diff/86400)}d ago`;
}

// ============================================
// SCORE RING COMPONENT
// ============================================
function ScoreRing({ score, size = 140, strokeWidth = 8, label = "Compliance" }) {
  const radius = (size - strokeWidth) / 2;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (score / 100) * circumference;
  const color = getScoreColor(score);

  return (
    <div className="score-ring-container" style={{ width: size, height: size }}>
      <svg className="score-ring" width={size} height={size}>
        <circle className="score-ring-bg" cx={size/2} cy={size/2} r={radius} />
        <circle
          className="score-ring-fill"
          cx={size/2} cy={size/2} r={radius}
          stroke={color}
          strokeDasharray={circumference}
          strokeDashoffset={offset}
        />
      </svg>
      <div className="score-ring-text">
        <div className="score-ring-value" style={{ color }}>{score}%</div>
        <div className="score-ring-label">{label}</div>
      </div>
    </div>
  );
}

// ============================================
// MODAL COMPONENT
// ============================================
function Modal({ title, onClose, children }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h2 className="modal-title">{title}</h2>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    );
  }

  return (
    <div>
      <div className="page-header">
        <div className="page-title">Compliance Frameworks</div>
        <div className="page-subtitle">Manage your regulatory compliance across multiple frameworks.</div>
      </div>

          const categoryColors = {
            Security: { bg: 'var(--primary-bg)', color: 'var(--primary)' },
            Healthcare: { bg: 'var(--success-bg)', color: 'var(--success)' },
            Privacy: { bg: 'var(--warning-bg)', color: 'var(--warning)' },
          };
          const color = categoryColors[fw.category] || { bg: 'var(--info-bg)', color: 'var(--info)' };

          return (
            <div key={fw.id} className="framework-card" onClick={() => fw.subscribed && loadControls(fw.id)}>
              <div className="framework-card-header">
                <div>
                  <div style={{fontSize:20, fontWeight:700, marginBottom:4}}>{fw.short_name}</div>
                  <div style={{fontSize:13, color:'var(--text-secondary)'}}>{fw.name}</div>
                </div>
                <span className="framework-badge" style={{background: color.bg, color: color.color}}>
                  {fw.category}
                </span>
              </div>
              <div style={{fontSize:13, color:'var(--text-secondary)', marginBottom:12}}>{fw.description?.slice(0, 100)}...</div>
              <div style={{fontSize:13, color:'var(--text-muted)'}}>
                {fw.total_controls} controls · Version {fw.version}
              </div>
              {fw.subscribed ? (
                <div style={{marginTop:12}}>
                  <span className="status-badge status-compliant">Active</span>
                </div>
              ) : (
                <button className="btn btn-primary btn-sm" style={{marginTop:12}} onClick={(e) => { e.stopPropagation(); subscribeFw(fw.id); }}>
                  Activate Framework
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ReportsPage() {
  const [frameworks, setFrameworks] = useState([]);
  const [report, setReport] = useState(null);
  const [loading, setLoading] = useState(false);

  useEffect(() => { api.get('/frameworks').then(setFrameworks); }, []);

  const generateReport = async (fwId) => {
    setLoading(true);
    const data = await api.get(`/reports/compliance/${fwId}`);
    setReport(data);
    setLoading(false);
  };

  if (report) {
    const fw = report.framework;
    const stats = {
      total: report.controls.length,
      compliant: report.controls.filter(c => c.compliance_status === 'compliant').length,
      in_progress: report.controls.filter(c => c.compliance_status === 'in_progress').length,
      non_compliant: report.controls.filter(c => c.compliance_status === 'non_compliant').length,
      not_started: report.controls.filter(c => !c.compliance_status || c.compliance_status === 'not_started').length,
    };
    const score = stats.total > 0 ? Math.round(stats.compliant / stats.total * 100) : 0;

    const categories = [...new Set(report.controls.map(c => c.category))];

    return (
      <div>
        <div className="page-header">
          <button className="btn btn-ghost" onClick={() => setReport(null)}>← Back to Reports</button>
          <div className="page-title" style={{marginTop:8}}>{fw.name} — Compliance Report</div>
          <div className="page-subtitle">Generated {new Date(report.generated_at).toLocaleDateString()} for {report.org.name}</div>
        </div>

        <div className="stats-grid">
          <div className="stat-card">
            <div className="stat-label">Overall Score</div>
            <div className="stat-value" style={{color:getScoreColor(score)}}>{score}%</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Controls Compliant</div>
            <div className="stat-value" style={{color:'var(--success)'}}>{stats.compliant}/{stats.total}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Evidence Items</div>
            <div className="stat-value">{report.evidence.length}</div>
          </div>
          <div className="stat-card">
            <div className="stat-label">Gaps</div>
            <div className="stat-value" style={{color:'var(--danger)'}}>{stats.non_compliant}</div>
          </div>
        </div>

        {categories.map(cat => {
          const catControls = report.controls.filter(c => c.category === cat);
          return (
            <div key={cat} className="card" style={{marginBottom:16}}>
              <div className="card-header">
                <div className="card-title">{cat}</div>
                <span style={{fontSize:12, color:'var(--text-muted)'}}>
                  {catControls.filter(c => c.compliance_status === 'compliant').length}/{catControls.length} compliant
                </span>
              </div>
              {catControls.map(ctrl => (
                <div key={ctrl.id} style={{display:'flex', alignItems:'center', justifyContent:'space-between', padding:'10px 0', borderBottom:'1px solid var(--border)'}}>
                  <div style={{flex:1}}>
                    <span style={{fontFamily:'monospace', fontSize:12, color:'var(--primary)', marginRight:8}}>{ctrl.control_id}</span>
                    <span style={{fontSize:13, fontWeight:500}}>{ctrl.title}</span>
                  </div>
                  <span className={`status-badge status-${ctrl.compliance_status || 'not_started'}`}>
                    {getStatusLabel(ctrl.compliance_status || 'not_started')}
                  </span>
                </div>
              ))}
            </div>
          );
        })}
      </div>
    );
  }

  return (
    <div>
      <div className="page-header">
        <div className="page-title">Audit Reports</div>
        <div className="page-subtitle">Generate audit-ready compliance reports for any framework.</div>
      </div>

      <div className="framework-grid">
        {frameworks.filter(f => f.subscribed).map(fw => (
          <div key={fw.id} className="framework-card" onClick={() => generateReport(fw.id)}>
            <div style={{fontSize:18, fontWeight:700, marginBottom:8}}>{fw.short_name} Report</div>
            <div style={{fontSize:13, color:'var(--text-secondary)', marginBottom:16}}>{fw.name}</div>
            <button className="btn btn-primary btn-sm">
              {loading ? 'Generating...' : '📊 Generate Report'}
            </button>
          </div>
        ))}
      </div>

      {frameworks.filter(f => f.subscribed).length === 0 && (
        <div className="empty-state">
          <div className="empty-state-icon">📊</div>
          <div className="empty-state-title">No active frameworks</div>
          <div className="empty-state-desc">Activate a compliance framework first to generate reports.</div>
        </div>
      )}
    </div>
  );
}

function BillingPage() {
  const [plans, setPlans] = useState([]);
  const [subscription, setSubscription] = useState(null);
  const [loading, setLoading] = useState(null);

  useEffect(() => {
    api.get('/billing/plans').then(d => setPlans(d.plans || []));
    api.get('/billing/subscription').then(setSubscription);
  }, []);

  const checkout = async (planId) => {
    setLoading(planId);
    const result = await api.post('/billing/checkout', { plan: planId });
    setLoading(null);
    if (result.checkout_url) {
      window.location.href = result.checkout_url;
    } else {
      alert(result.error || 'Failed to start checkout.');
    }
  };

  const portal = async () => {
    const result = await api.post('/billing/portal', {});
    if (result.portal_url) window.location.href = result.portal_url;
    else alert(result.error || 'Failed to open billing portal.');
  };

  const planColors = { starter: 'var(--info)', growth: 'var(--primary)', pro: 'var(--success)' };

  return (

              <div style={{fontSize:13, color:'var(--text-secondary)'}}>
                Status: <span className={`status-badge status-${subscription.status === 'active' ? 'compliant' : 'in_progress'}`}>{subscription.status || 'trialing'}</span>

              <button className="btn btn-secondary" onClick={portal}>Manage Subscription →</button>

          <div key={plan.id} className={`pricing-card ${plan.popular ? 'popular' : ''}`} style={{position:'relative'}}>

              className={`btn ${currentPlan === plan.id ? 'btn-secondary' : 'btn-primary'}`}
              style={{width:'100%', justifyContent:'center'}}
              onClick={() => currentPlan !== plan.id && checkout(plan.id)}
              disabled={loading === plan.id || currentPlan === plan.id}
            >
              {loading === plan.id ? 'Redirecting...' : currentPlan === plan.id ? 'Current Plan' : `Upgrade to ${plan.name}`}
            </button>
            <ul className="pricing-features">
              {plan.features.map((f, i) => <li key={i}>{f}</li>)}
            </ul>
          </div>
        ))}
      </div>

      <div className="card">
        <div className="card-title" style={{marginBottom:12}}>Stripe Setup Required</div>
        <div style={{fontSize:13, color:'var(--text-secondary)', lineHeight:1.7}}>
          To activate billing, set these environment variables before starting the server:
        </div>
        <div style={{background:'var(--bg)', border:'1px solid var(--border)', borderRadius:8, padding:16, marginTop:12, fontFamily:'monospace', fontSize:12, lineHeight:2}}>
          <div><span style={{color:'var(--primary)'}}>STRIPE_SECRET_KEY</span>=sk_live_...</div>
          <div><span style={{color:'var(--primary)'}}>STRIPE_WEBHOOK_SECRET</span>=whsec_...</div>
          <div><span style={{color:'var(--primary)'}}>STRIPE_PRICE_STARTER</span>=price_...</div>
          <div><span style={{color:'var(--primary)'}}>STRIPE_PRICE_GROWTH</span>=price_...</div>
          <div><span style={{color:'var(--primary)'}}>STRIPE_PRICE_PRO</span>=price_...</div>
          <div><span style={{color:'var(--primary)'}}>FRONTEND_URL</span>=https://your-domain.vercel.app</div>
        </div>
        <div style={{fontSize:12, color:'var(--text-muted)', marginTop:12}}>
          Find your API keys at dashboard.stripe.com → Developers → API Keys. Create products and prices at dashboard.stripe.com → Products.
        </div>
      </div>
    </div>
  );
}

// ============================================
// MAIN APP
// ============================================
function App() {
  const [page, setPage] = useState('landing');
  const [dashboard, setDashboard] = useState(null);

  const loadDashboard = useCallback(async () => {
    try {
      const data = await api.get('/dashboard');
      setDashboard(data);
    } catch (e) {
      console.error('Failed to load dashboard:', e);
    }
  }, []);

  useEffect(() => {
    if (page !== 'landing') {
      loadDashboard();
    }
  }, [page, loadDashboard]);

  const enterApp = () => setPage('dashboard');

  if (page === 'landing') {
    // Check if already logged in
    const user = localStorage.getItem('ck_user');
    if (user) { setTimeout(() => setPage('dashboard'), 0); return null; }
    return <LoginPage onEnterApp={enterApp} />;
  }

  const navItems = [
    { id: 'dashboard', icon: '📊', label: 'Dashboard' },
    { id: 'frameworks', icon: '🛡️', label: 'Frameworks' },
    { id: 'evidence', icon: '📎', label: 'Evidence' },
    { id: 'alerts', icon: '📡', label: 'Regulatory Radar', badge: dashboard?.unread_alerts },
    { id: 'policies', icon: '📄', label: 'Policies' },
    { id: 'reports', icon: '📑', label: 'Reports' },
  ];

  const renderPage = () => {
    switch (page) {
      case 'dashboard': return <DashboardPage dashboard={dashboard} onNavigate={setPage} />;
      case 'frameworks': return <FrameworksPage />;
      case 'evidence': return <EvidencePage />;
      case 'alerts': return <AlertsPage />;
      case 'policies': return <PoliciesPage />;
      case 'reports': return <ReportsPage />;
      case 'billing': return <BillingPage />;
      case 'settings': return <SettingsPage />;
      default: return <DashboardPage dashboard={dashboard} onNavigate={setPage} />;
    }
  };

  return (
    <div className="app-layout">
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="sidebar-logo-icon">C</div>
          <div className="sidebar-logo-text">ComplianceKit</div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section">
            <div className="nav-section-title">Overview</div>
            {navItems.slice(0, 1).map(item => (
              <button key={item.id} className={`nav-item ${page === item.id ? 'active' : ''}`} onClick={() => setPage(item.id)}>
                <span className="nav-item-icon">{item.icon}</span>
                {item.label}
                {item.badge > 0 && <span className="nav-badge">{item.badge}</span>}
              </button>
            ))}
          </div>
          <div className="nav-section">
            <div className="nav-section-title">Compliance</div>
            {navItems.slice(1, 4).map(item => (
              <button key={item.id} className={`nav-item ${page === item.id ? 'active' : ''}`} onClick={() => setPage(item.id)}>
                <span className="nav-item-icon">{item.icon}</span>
                {item.label}
                {item.badge > 0 && <span className="nav-badge">{item.badge}</span>}
              </button>
            ))}
          </div>
          <div className="nav-section">
            <div className="nav-section-title">Tools</div>
            {navItems.slice(4).map(item => (
              <button key={item.id} className={`nav-item ${page === item.id ? 'active' : ''}`} onClick={() => setPage(item.id)}>
                <span className="nav-item-icon">{item.icon}</span>
                {item.label}
              </button>
            ))}
          </div>
          <div className="nav-section">
            <div className="nav-section-title">Account</div>
            <button className={`nav-item ${page === 'billing' ? 'active' : ''}`} onClick={() => setPage('billing')}>
              <span className="nav-item-icon">💳</span>
              Billing
            </button>
            <button className={`nav-item ${page === 'settings' ? 'active' : ''}`} onClick={() => setPage('settings')}>
              <span className="nav-item-icon">⚙️</span>
              Settings
            </button>
          </div>
        </nav>
        <div className="sidebar-footer">
          <div className="user-info">
            <div className="user-avatar">{(() => { try { const u = JSON.parse(localStorage.getItem('ck_user') || '{}'); return (u.name || 'U').slice(0,2).toUpperCase(); } catch(e) { return 'JC'; } })()}</div>
            <div className="user-details">
              <div className="user-name">{(() => { try { return JSON.parse(localStorage.getItem('ck_user') || '{}').name || 'User'; } catch(e) { return 'User'; } })()}</div>
              <div className="user-role" style={{ cursor:'pointer', color:'var(--danger)' }} onClick={() => { localStorage.removeItem('ck_user'); window.location.reload(); }}>Sign out</div>
            </div>
          </div>
        </div>
      </aside>
      <main className="main-content">
        <div className="page-container">
          {renderPage()}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
